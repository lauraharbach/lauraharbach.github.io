---
layout: default
---
<div class="page-wrapper">
  <div class="container">

    <header class="page-header reveal">
      {% if page.eyebrow %}
      <span class="page-eyebrow">{{ page.eyebrow }}</span>
      {% endif %}
      <h1>{{ page.title }}</h1>
      {% if page.subtitle %}
      <p class="page-subtitle">{{ page.subtitle }}</p>
      {% endif %}
    </header>

    <div class="page-content">
      {{ content }}
    </div>

  </div>
</div>
